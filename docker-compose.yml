services:
  backend:
    build: ./backend
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3001
      - DB_PATH=/app/data/boardshelf.db
      - UPCITEMDB_KEY=${UPCITEMDB_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - BGG_API_KEY=${BGG_API_KEY:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - ALLOWED_EMAILS=${ALLOWED_EMAILS:-}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
